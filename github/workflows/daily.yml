name: Daily Job Scan

on:
  schedule:
    # 11:00 UTC = 7:00 AM Eastern (during daylight saving time)
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write         # allows the workflow to commit results back

concurrency:
  group: job-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run job scraper
        run: python main.py

      - name: Commit results
        run: |
          git config user.name "job-bot"
          git config user.email "job-bot@users.noreply.github.com"
          git add docs seen_links.json
          git commit -m "Daily job scan $(date +%F)" || echo "No changes today"
          git push

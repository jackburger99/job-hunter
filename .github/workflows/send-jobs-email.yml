name: Scrape & Email Job Postings

on:
  schedule:
    # Run daily at 8 AM EST (1 PM UTC)
    - cron: '0 13 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape-and-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install playwright
          playwright install chromium

      - name: Run job scraper
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: python main.py

      - name: Read email body
        id: read_email
        run: |
          if [ -f docs/email_body.html ]; then
            BODY=$(cat docs/email_body.html)
            echo "body<<EOF" >> $GITHUB_OUTPUT
            echo "$BODY" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "body=No new jobs today." >> $GITHUB_OUTPUT
          fi

      - name: Send email with new jobs
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🎯 New Job Postings Today"
          from: ${{ secrets.MAIL_FROM }}
          to: ${{ secrets.MAIL_TO }}
          html_body: ${{ steps.read_email.outputs.body }}

      - name: Commit changes
        if: always()
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/ seen_links.json .new_count 2>/dev/null || true
          git diff --quiet && git diff --staged --quiet || git commit -m "Update job listings"

      - name: Push changes
        if: always()
        run: git push || true

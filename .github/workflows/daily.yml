name: Daily Job Scan

on:
  schedule:
    # 11:00 UTC = 7:00 AM Eastern (during daylight saving time)
    - cron: "0 11 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write         # allows the workflow to commit results back

concurrency:
  group: job-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run job scraper
        run: python main.py

      - name: Read email body
        id: email_body
        run: |
          if [ -f docs/email_body.html ]; then
            echo "body=$(cat docs/email_body.html)" >> $GITHUB_OUTPUT
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Read new jobs count
        id: new_count
        run: |
          if [ -f .new_count ]; then
            COUNT=$(cat .new_count)
            echo "count=$COUNT" >> $GITHUB_OUTPUT
          else
            echo "count=0" >> $GITHUB_OUTPUT
          fi

      - name: Send new jobs email
        if: steps.new_count.outputs.count != '0'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_FROM }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🆕 New Job Postings Today"
          to: ${{ secrets.MAIL_TO }}
          from: ${{ secrets.MAIL_FROM }}
          html_body: ${{ steps.email_body.outputs.body }}

      - name: Commit results
        run: |
          git config user.name "job-bot"
          git config user.email "job-bot@users.noreply.github.com"
          git add docs seen_links.json
          git commit -m "Daily job scan $(date +%F)" || echo "No changes today"
          git push

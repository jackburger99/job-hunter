name: Daily Job Scan

on:
  schedule:
    # 11:00 UTC = 7:00 AM Eastern (daylight saving time)
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: job-scan
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run job scraper
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: python main.py

      - name: Count new postings
        id: check
        run: echo "count=$(cat .new_count 2>/dev/null || echo 0)" >> "$GITHUB_OUTPUT"

      - name: Email new postings
        if: steps.check.outputs.count > 0
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "${{ steps.check.outputs.count }} new job postings — Job Hunter"
          to: ${{ secrets.MAIL_TO }}
          from: Job Hunter Bot
          html_body: file://docs/email_body.html

      - name: Commit results
        run: |
          git config user.name "job-bot"
          git config user.email "job-bot@users.noreply.github.com"
          git add docs seen_links.json
          git commit -m "Daily job scan $(date +%F)" || echo "No changes today"
          git push
